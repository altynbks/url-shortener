<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go URL Shortener</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-top: 0;
        }

        input[type="url"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            word-break: break-all;
        }

        .success a {
            color: #28a745;
            text-decoration: none;
            font-weight: bold;
        }
        
        .success a:hover {
            text-decoration: underline;
        }

        .error {
            color: #dc3545;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>URL Shortener </h2>
        <form id="shortenForm">
            <input type="url" id="longUrl" placeholder="https://example.com" required>
            <button type="submit">shorten</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('shortenForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const longUrl = document.getElementById('longUrl').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Loading...';
            resultDiv.className = '';

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ long: longUrl })
                });

                if (!response.ok) {
                    throw new Error('Error while shortening link');
                }

                const data = await response.json();
                
                const shortUrl = window.location.origin + '/r/' + data.short;
                resultDiv.innerHTML = `Done: <br><br> <a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
                resultDiv.className = 'success';
                
            } catch (error) {
                resultDiv.innerHTML = error.message;
                resultDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
